name: Django Build Check

on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check migrations
        run: |
          python manage.py makemigrations --check --dry-run

      - name: Check if static files changed
        id: static_check
        run: |
          if git rev-parse HEAD~1 > /dev/null 2>&1; then
            DIFF=$(git diff --name-only HEAD~1 HEAD)
          else
            # First commit — compare against the empty tree
            DIFF=$(git diff --name-only 4b825dc642cb6eb9a060e54bf8d69288fbee4904 HEAD)
          fi
          echo "$DIFF" | grep -q "^static/" && echo "changed=true" >> $GITHUB_OUTPUT || echo "changed=false" >> $GITHUB_OUTPUT

      - name: Docker build check
        run: docker build --tag agrogest:ci .

      - name: Collect static
        if: steps.static_check.outputs.changed == 'true'
        env:
          DJANGO_DEBUG: ${{ secrets.DJANGO_DEBUG }}
          DJANGO_SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
          DJANGO_ALLOWED_HOSTS: ${{ secrets.DJANGO_ALLOWED_HOSTS }}
          CLOUDFLARE_R2_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_R2_ACCOUNT_ID }}
          CLOUDFLARE_R2_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
          CLOUDFLARE_R2_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_R2_STATICS_BUCKET_NAME: ${{ secrets.CLOUDFLARE_R2_STATICS_BUCKET_NAME }}
          CLOUDFLARE_R2_STATICS_PUBLIC_URL: ${{ secrets.CLOUDFLARE_R2_STATICS_PUBLIC_URL }}
        run: |
          python manage.py collectstatic --noinput
