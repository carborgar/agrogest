name: Django Build Check

on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check migrations
        run: |
          python manage.py makemigrations --check --dry-run

      # ── Collectstatic incremental ─────────────────────────────────────────
      # Calcula un hash de todos los ficheros estáticos fuente (static/, scss/,
      # plantillas). Si el hash coincide con el de la última ejecución exitosa,
      # los ficheros ya están en R2 y podemos saltarnos el paso por completo.
      - name: Hash static sources
        id: static-hash
        run: |
          HASH=$(find static/ scss/ templates/ -type f | sort | xargs sha256sum | sha256sum | cut -d' ' -f1)
          echo "hash=$HASH" >> $GITHUB_OUTPUT

      - name: Cache static marker
        id: static-cache
        uses: actions/cache@v4
        with:
          # El fichero .static-deployed actúa como marcador: si existe en caché
          # con el mismo hash, significa que ya subimos esos ficheros a R2.
          path: .static-deployed
          key: static-${{ steps.static-hash.outputs.hash }}

      - name: Collect static
        if: steps.static-cache.outputs.cache-hit != 'true'
        env:
          DJANGO_DEBUG: ${{ secrets.DJANGO_DEBUG }}
          DJANGO_SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
          DJANGO_ALLOWED_HOSTS: ${{ secrets.DJANGO_ALLOWED_HOSTS }}
          CLOUDFLARE_R2_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_R2_ACCOUNT_ID }}
          CLOUDFLARE_R2_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
          CLOUDFLARE_R2_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_R2_STATICS_BUCKET_NAME: ${{ secrets.CLOUDFLARE_R2_STATICS_BUCKET_NAME }}
          CLOUDFLARE_R2_STATICS_PUBLIC_URL: ${{ secrets.CLOUDFLARE_R2_STATICS_PUBLIC_URL }}
        run: |
          python manage.py collectstatic --noinput
          touch .static-deployed
